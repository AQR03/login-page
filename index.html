<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="body">
        <div class="img">
            <img src="sidebar.png" id="sidebar">
        </div>
        <div class="login-form">
            <div class="header-text">
                <h3>
                    This is not a real online service! You know you need something like this in your life
                    to help you realize your deepest dreams.
                </h3>
                <h3>
                    Sign up <em>now</em> to get started.
                </h3>
            </div>
            
            <form>
                <h3>Let's do this!</h3>
                <div class="login">
                    <div class="field">
                        <label for="first_name">First Name:</label>
                        <input type="text" id="first_name" placeholder="First Name">
                    </div>
                    <div class="field">
                        <label for="last_name">Last Name:</label>
                        <input type="text" id="last_name" placeholder="Last Name">
                    </div>
                </div>
                <div class="login">
                    <div class="field">
                        <label for="email">Email:</label>
                        <input type="email" id="email" placeholder="Email">
                    </div>
                    <div class="field">
                        <label for="phone_number">Phone Number:</label>
                        <input type="number" id="phone_number" placeholder="(888) 888-8888">
                    </div>
                </div>
                <div class="login">
                    <div class="field">
                        <label for="password">Password:</label>
                        <input type="password" id="password" placeholder="Password">
                    </div>
                    <div class="field">
                        <label for="password_confirm">Confirm Password</label>
                        <input type="password" id="password_confirm" placeholder="Password">
                    </div>
                </div>
                <div class="submit">
                    <button type="submit">Create Account</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
